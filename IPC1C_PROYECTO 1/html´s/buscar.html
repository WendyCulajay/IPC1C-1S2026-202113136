<!DOCTYPE html>
<html>
<head>
<title>Buscar Producto</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
}

.contenedor{
width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
margin-top:60px;
}

input, select{
width:100%;
padding:8px;
margin:5px 0 15px 0;
}

button{
width:100%;
padding:10px;
background:#7c1fb2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.atras{
background:gray;
margin-top:10px;
}

.resultado{
margin-top:20px;
padding:10px;
background:#eee;
}

</style>

</head>

<body>

<div class="contenedor">

<h2>Buscar Producto</h2>

<label>Buscar por</label>

<select id="tipoBusqueda">
<option value="codigo">Código</option>
<option value="nombre">Nombre</option>
<option value="categoria">Categoría</option>
</select>

<label>Ingrese dato</label>
<input type="text" id="dato">

<button onclick="buscarProducto()">Buscar</button>

<button class="atras" onclick="location.href='index.html'">
⬅ Volver al menú
</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function buscarProducto(){

let tipo = document.getElementById("tipoBusqueda").value;
let dato = document.getElementById("dato").value.trim().toLowerCase();

let productos = JSON.parse(localStorage.getItem("productos")) || [];

let resultado = document.getElementById("resultado");

resultado.innerHTML = "";

let encontrado = false;

for(let i=0;i<productos.length;i++){

if(
(tipo=="codigo" && productos[i].codigo.toLowerCase()==dato) ||
(tipo=="nombre" && productos[i].nombre.toLowerCase()==dato) ||
(tipo=="categoria" && productos[i].categoria.toLowerCase()==dato)
){

resultado.innerHTML +=
"<b>Nombre:</b> " + productos[i].nombre + "<br>" +
"<b>Categoría:</b> " + productos[i].categoria + "<br>" +
"<b>Precio:</b> Q" + productos[i].precio + "<br>" +
"<b>Stock:</b> " + productos[i].stock + "<br>" +
"<b>Código:</b> " + productos[i].codigo +
"<hr>";

encontrado = true;

}

}

if(!encontrado){
resultado.innerHTML = "No se encontró ningún producto.";
}

}

</script>

</body>
</html>
